<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">Little Kitchen Survey Form</h1>
    <p id="description">Thank you for taking the time to help us improve our services.</p>
    <form id="survey-form" action="" method="GET">
      
        <label for="name" id="name-label">Name(Required Field):</label>
        <input required type="text" name="name"id="name" minlength="3" maxlength="40" placeholder="Enter your name"/>
        <label for="email" id="email-label">Email(Required Field)</label>
        <input required type="email" name="email" id="email" placeholder="Enter your email address"/>
        <label for="number" id="number-label">Age(Optional)</label>
        <input type="number" name="number" id="number"min="18" max="101" placeholder="00"/>
        </fieldset>
        <fieldset>
          <legend>Would you recommend Little Kitchen to a friend?</legend>
          <input type="radio" id="yes" name="recommendation" value="yes"/>
          <label for="yes">Yes</label>
          <input type="radio" id="no" name="recommendation" value="no"/>
          <label for="no">No</label>
          <input type="radio" id="maybe" name="recommendation" value="maybe"/>
          <label for="maybe">Maybe</label>
          </fieldset>
          <fieldset>
            <legend>Choose your favourites</legend>
            <label for="dropdown">Main course</label>
            <select id="dropdown" name="main">
            <option value="amatricciana">Amatricciana</option>
            <option value="stroganoff">Stroganoff</option>
            <option value="mousakas">Mousakas</option>
            <option value="carbonara">Carbonara</option>  
            </select>
            <label for="desserts">Desserts</label>
            <select id="desserts" name="desserts">
              <option value="cheesecake">Cheesecake</option>
              <option value="tiramisu">Tiramisu</option>
              <option value="profiterol">Profiterol</option>
              </select>
              </fieldset>
              <fieldset>
                <legend>How to be better</legend>
                <input type="checkbox" id="service" name="choice" value="service">
                <label for="service">Service</label>
                <input type="checkbox" id="delivery" name="choice"value="delivery">
                <label for="delivery">Delivery</label>
                <input type="checkbox" id="new-recipes" name="choice" value="new-recipes">
                <label for="new-recipes">New Recipes</label>
                </fieldset>
                <fieldset>
                  <legend>Additional Comments</legend>
                  <label for="comments"></label><textarea id="comments"name="comments" rows="4"cols="50" placeholder="Write your text"></textarea>
                  </fieldset>
                  <button type="submit" id="submit">Submit Form</button>
                  </form>

  </body>
</html>
